<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViveADN — Tu propósito, nuestra esencia.</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --verde:  #00523c;
  --oro:    #f5a623;
  --arena:  #f4f0e6;
  --gris:   #2c3e50;
  --blanco: #ffffff;
  --navy:   #0d1b3e;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--verde);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
}

.bg-texture{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -5%, rgba(245,166,35,0.13) 0%, transparent 50%),
    radial-gradient(ellipse 50% 40% at 100% 100%, rgba(0,0,0,0.15) 0%, transparent 50%),
    linear-gradient(160deg, #00523c 0%, #003d2c 50%, #002a1e 100%);
  z-index:0;
}

.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(245,166,35,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,166,35,0.04) 1px, transparent 1px);
  background-size:52px 52px;
  z-index:0;
}

.corner{position:fixed;z-index:1;opacity:0.18;}
.corner-tl{top:1.5rem;left:1.5rem;width:32px;height:32px;border-top:1px solid var(--oro);border-left:1px solid var(--oro);}
.corner-tr{top:1.5rem;right:1.5rem;width:32px;height:32px;border-top:1px solid var(--oro);border-right:1px solid var(--oro);}
.corner-bl{bottom:1.5rem;left:1.5rem;width:32px;height:32px;border-bottom:1px solid var(--oro);border-left:1px solid var(--oro);}
.corner-br{bottom:1.5rem;right:1.5rem;width:32px;height:32px;border-bottom:1px solid var(--oro);border-right:1px solid var(--oro);}

/* ── SPLASH ── */
.splash{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:2rem;width:100%;max-width:860px;
}

/* ── LOGO ROW ── */
.logo-row{
  display:flex;align-items:center;justify-content:center;
  gap:2.8rem;margin-bottom:2.2rem;
  flex-wrap:nowrap;
}

/* ── ÍCONO SVG con grupos animados ── */
.logo-icon{
  flex-shrink:0;
  width:clamp(80px,12vw,120px);
  height:auto;
  filter:drop-shadow(0 4px 18px rgba(245,166,35,0.2));
}

/* Cada grupo de nodos arranca invisible */
.logo-icon .g1,
.logo-icon .g2,
.logo-icon .g3,
.logo-icon .g4,
.logo-icon .g5{
  opacity:0;
  animation:nodoPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

/* Grupos aparecen escalonados */
.logo-icon .g1{ animation-delay:0.1s; transform-origin:50% 85%; }
.logo-icon .g2{ animation-delay:0.35s; transform-origin:30% 60%; }
.logo-icon .g3{ animation-delay:0.6s;  transform-origin:50% 40%; }
.logo-icon .g4{ animation-delay:0.85s; transform-origin:70% 25%; }
.logo-icon .g5{ animation-delay:1.05s; transform-origin:50% 10%; }

@keyframes nodoPop{
  0%  {opacity:0; transform:scale(0.3);}
  60% {opacity:1; transform:scale(1.12);}
  100%{opacity:1; transform:scale(1);}
}

/* ── WORDMARK ── */
.logo-wordmark{
  display:flex;flex-direction:column;
  align-items:flex-start;gap:0;
}

.word-vive{
  font-family:'Outfit',sans-serif;
  font-size:clamp(3rem,8vw,6rem);
  font-weight:800;color:var(--oro);
  line-height:0.92;letter-spacing:-0.01em;
  opacity:0;transform:translateX(-40px);
  animation:slideWord 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
  animation-delay:1.35s;
}
.word-adn{
  font-family:'Outfit',sans-serif;
  font-size:clamp(3rem,8vw,6rem);
  font-weight:800;color:var(--blanco);
  line-height:0.92;letter-spacing:-0.01em;
  opacity:0;transform:translateX(-40px);
  animation:slideWord 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
  animation-delay:1.6s;
}

@keyframes slideWord{
  from{opacity:0;transform:translateX(-40px);}
  to{opacity:1;transform:translateX(0);}
}

/* ── DIVIDER ── */
.divider{
  width:55px;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--oro),transparent);
  margin:0 auto 1.4rem;
  opacity:0;
  animation:fadeIn 0.6s ease forwards;
  animation-delay:1.9s;
}

/* ── SLOGAN ── */
.slogan{
  font-family:'Outfit',sans-serif;
  font-size:clamp(1rem,2.2vw,1.25rem);
  font-weight:300;
  color:rgba(255,255,255,0.7);
  letter-spacing:0.01em;
  line-height:1.5;
  margin-bottom:2.5rem;
  opacity:0;
  animation:fadeUp 0.7s ease forwards;
  animation-delay:2.05s;
}
.slogan strong{
  color:var(--oro);font-weight:600;
}

/* ── BOTONES ── */
.cta-row{
  display:flex;gap:0.9rem;
  flex-wrap:wrap;justify-content:center;
  opacity:0;
  animation:fadeUp 0.7s ease forwards;
  animation-delay:2.25s;
}

.btn-main{
  display:inline-flex;align-items:center;gap:0.5rem;
  background:var(--oro);color:var(--navy);
  font-family:'Outfit',sans-serif;
  font-weight:700;font-size:0.88rem;
  padding:0.8rem 1.9rem;border-radius:8px;
  text-decoration:none;border:none;cursor:pointer;
  transition:all 0.25s;
  box-shadow:0 4px 20px rgba(245,166,35,0.35);
}
.btn-main:hover{background:#ffc14a;transform:translateY(-2px);box-shadow:0 8px 28px rgba(245,166,35,0.45);}

.btn-demo{
  display:inline-flex;align-items:center;gap:0.5rem;
  background:transparent;
  border:1px solid rgba(255,255,255,0.22);
  color:rgba(255,255,255,0.7);
  font-family:'Outfit',sans-serif;
  font-weight:500;font-size:0.88rem;
  padding:0.8rem 1.9rem;border-radius:8px;
  text-decoration:none;cursor:pointer;
  transition:all 0.25s;
}
.btn-demo:hover{border-color:rgba(245,166,35,0.5);color:var(--oro);transform:translateY(-2px);}

/* ── FIRMA ── */
.footer-sig{
  position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);
  z-index:2;
  font-family:'DM Sans',sans-serif;
  font-size:0.62rem;letter-spacing:0.12em;
  color:rgba(255,255,255,0.18);
  text-transform:uppercase;white-space:nowrap;
  opacity:0;
  animation:fadeIn 1s ease forwards;
  animation-delay:2.5s;
}

/* ── MÓVIL ── */
@media(max-width:580px){
  .logo-row{
    flex-direction:column;
    gap:1.2rem;
    margin-bottom:1.8rem;
  }
  .logo-wordmark{align-items:center;order:2;}
  .logo-icon{order:1;}
  .corner{display:none;}
  .cta-row{flex-direction:column;align-items:center;}
  .btn-main,.btn-demo{width:100%;max-width:260px;justify-content:center;}
  .footer-sig{font-size:0.55rem;text-align:center;width:90%;}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes fadeIn{
  from{opacity:0;}to{opacity:1;}
}

body.leaving{animation:fadeOut 0.44s ease forwards;}
@keyframes fadeOut{to{opacity:0;}}
</style>
</head>

<div class="footer-sig">ViveADN · viveadn.com · Tu propósito, nuestra esencia · 2026</div>

<script>
document.querySelectorAll('.btn-main,.btn-demo').forEach(btn=>{
  btn.addEventListener('click',function(e){
    const href=this.getAttribute('href');
    if(!href||href==='#')return;
    e.preventDefault();
    document.body.classList.add('leaving');
    setTimeout(()=>{window.location.href=href;},440);
  });
});
document.addEventListener('keydown',e=>{
  if(e.key==='Enter') document.querySelector('.btn-main').click();
});
</script>

</html>
